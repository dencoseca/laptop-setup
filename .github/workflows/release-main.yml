name: Release main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: true

jobs:
  release:
    name: Test, build, and publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build Apple Silicon binary
        run: |
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 \
            go build -trimpath -o laptop-setup-darwin-arm64 ./cmd/laptop-setup

      - name: Publish rolling latest release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: latest
          ASSET_NAME: laptop-setup-darwin-arm64
        run: |
          set -eu

          git tag -f "$TAG_NAME" "$GITHUB_SHA"
          git push origin "refs/tags/$TAG_NAME" --force

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$ASSET_NAME" --clobber
            gh release edit "$TAG_NAME" \
              --target "$GITHUB_SHA" \
              --title "Latest main build" \
              --notes "Rolling build from main at $GITHUB_SHA." \
              --latest
          else
            gh release create "$TAG_NAME" "$ASSET_NAME" \
              --target "$GITHUB_SHA" \
              --title "Latest main build" \
              --notes "Rolling build from main at $GITHUB_SHA." \
              --latest
          fi
